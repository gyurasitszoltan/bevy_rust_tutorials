<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="'IBM Plex Mono', monospace">
  <rect width="760" height="360" fill="#0c0a13"/>
  <!-- graph háttér rács -->
  <g stroke="#1a1626" stroke-width="1">
    <line x1="0" y1="60" x2="760" y2="60"/>
    <line x1="0" y1="120" x2="760" y2="120"/>
    <line x1="0" y1="180" x2="760" y2="180"/>
    <line x1="0" y1="240" x2="760" y2="240"/>
    <line x1="0" y1="300" x2="760" y2="300"/>
    <line x1="120" y1="0" x2="120" y2="360"/>
    <line x1="240" y1="0" x2="240" y2="360"/>
    <line x1="360" y1="0" x2="360" y2="360"/>
    <line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="600" y1="0" x2="600" y2="360"/>
  </g>

  <!-- bal node: Image -->
  <g>
    <rect x="60" y="120" width="150" height="90" rx="5" fill="#1c1828" stroke="#b07cff" stroke-width="2"/>
    <rect x="60" y="120" width="150" height="24" rx="5" fill="#b07cff"/>
    <rect x="60" y="138" width="150" height="6" fill="#b07cff"/>
    <text x="70" y="137" font-size="13" fill="#0c0a13" font-weight="700">Image</text>
    <text x="70" y="166" font-size="11.5" fill="#9a8fb0">path: hero.png</text>
    <text x="70" y="184" font-size="11.5" fill="#9a8fb0">color: 4</text>
    <text x="70" y="202" font-size="12" fill="#5ad7ff" font-weight="600">▸ Surface</text>
    <!-- output junction -->
    <circle cx="210" cy="200" r="7" fill="#5ad7ff" stroke="#0c0a13" stroke-width="2"/>
    <text x="196" y="190" font-size="10" fill="#5ad7ff" text-anchor="end">out</text>
  </g>

  <!-- connection (Bézier) -->
  <path d="M210 200 C 270 200, 270 210, 330 210" fill="none" stroke="#5ad7ff" stroke-width="3"/>
  <!-- mozgó adat-pont -->
  <circle cx="270" cy="203" r="4" fill="#d4a8ff">
    <animate attributeName="cx" values="210;330;210" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="200;206;200" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- jobb node: Preview -->
  <g>
    <rect x="330" y="160" width="160" height="90" rx="5" fill="#1c1828" stroke="#7ed957" stroke-width="2"/>
    <rect x="330" y="160" width="160" height="24" rx="5" fill="#7ed957"/>
    <rect x="330" y="178" width="160" height="6" fill="#7ed957"/>
    <text x="340" y="177" font-size="13" fill="#0c0a13" font-weight="700">Preview</text>
    <!-- input junction -->
    <circle cx="330" cy="210" r="7" fill="#5ad7ff" stroke="#0c0a13" stroke-width="2"/>
    <text x="344" y="206" font-size="10" fill="#5ad7ff">in</text>
    <!-- preview doboz -->
    <rect x="360" y="196" width="48" height="46" fill="#0c0a13"/>
    <g fill="#7ed957">
      <rect x="372" y="202" width="6" height="6"/>
      <rect x="378" y="208" width="6" height="6"/>
      <rect x="366" y="214" width="6" height="6"/>
      <rect x="390" y="220" width="6" height="6"/>
      <rect x="384" y="214" width="6" height="6"/>
      <rect x="378" y="226" width="6" height="6"/>
    </g>
    <g fill="#ffb454">
      <rect x="390" y="202" width="6" height="6"/>
      <rect x="384" y="208" width="6" height="6"/>
    </g>
    <text x="420" y="208" font-size="11" fill="#9a8fb0">surface</text>
    <text x="420" y="224" font-size="11" fill="#9a8fb0">128×128</text>
  </g>

  <!-- CÍMKÉK (magyarázatok) -->
  <!-- fejléc -->
  <g font-size="12.5" fill="#d4a8ff">
    <text x="60" y="40">1 ▸ Node fejléc — kategória-szín + név</text>
    <line x1="135" y1="46" x2="135" y2="118" stroke="#b07cff" stroke-width="1.5" stroke-dasharray="4 3"/>
  </g>
  <g font-size="12.5" fill="#9a8fb0">
    <text x="280" y="40">2 ▸ Kimeneti junction (kék = Surface adat)</text>
    <line x1="210" y1="44" x2="270" y2="190" stroke="#5ad7ff" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  </g>
  <g font-size="12.5" fill="#5ad7ff">
    <text x="520" y="180">3 ▸ Kapcsolat (link):</text>
    <text x="520" y="198">Bézier-görbe, drag a</text>
    <text x="520" y="216">junction-ról junction-ra</text>
    <text x="520" y="234">— az adat balról jobbra folyik</text>
  </g>
  <g font-size="12.5" fill="#7ed957">
    <text x="520" y="280">4 ▸ Bemeneti junction</text>
    <text x="520" y="298">(üreges kör — befogad)</text>
  </g>
  <g font-size="12.5" fill="#cfcae0">
    <text x="60" y="280">5 ▸ Paraméterek a node-on belül</text>
    <text x="60" y="298">(részletesen az Inspector-ban)</text>
  </g>
</svg>
