<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" font-family="'IBM Plex Mono', monospace">
  <rect width="840" height="380" fill="#0c0a13"/>
  <g stroke="#1a1626" stroke-width="1">
    <line x1="0" y1="76" x2="840" y2="76"/>
    <line x1="0" y1="152" x2="840" y2="152"/>
    <line x1="0" y1="228" x2="840" y2="228"/>
    <line x1="0" y1="304" x2="840" y2="304"/>
    <line x1="120" y1="0" x2="120" y2="380"/>
    <line x1="240" y1="0" x2="240" y2="380"/>
    <line x1="360" y1="0" x2="360" y2="380"/>
    <line x1="480" y1="0" x2="480" y2="380"/>
    <line x1="600" y1="0" x2="600" y2="380"/>
    <line x1="720" y1="0" x2="720" y2="380"/>
  </g>

  <!-- Frame (csoport) — nagy halvány téglalap a node-ok körül -->
  <rect x="30" y="60" width="500" height="180" rx="8" fill="rgba(176,124,255,.06)" stroke="#b07cff" stroke-width="2" stroke-dasharray="6 4"/>
  <rect x="30" y="60" width="180" height="26" rx="8" fill="#b07cff" opacity="0.18"/>
  <text x="44" y="78" font-size="12.5" fill="#d4a8ff" font-weight="700" letter-spacing="0.5">▦ Frame: „forrás sprite-ok"</text>

  <!-- node Image A a frame-en belül -->
  <g>
    <rect x="60" y="110" width="120" height="60" rx="5" fill="#1c1828" stroke="#b07cff" stroke-width="2"/>
    <rect x="60" y="110" width="120" height="20" rx="5" fill="#b07cff"/>
    <rect x="60" y="124" width="120" height="6" fill="#b07cff"/>
    <text x="70" y="124" font-size="11.5" fill="#0c0a13" font-weight="700">Image A</text>
    <circle cx="180" cy="140" r="5" fill="#5ad7ff" stroke="#0c0a13" stroke-width="2"/>
  </g>
  <g>
    <rect x="60" y="190" width="120" height="60" rx="5" fill="#1c1828" stroke="#b07cff" stroke-width="2"/>
    <rect x="60" y="190" width="120" height="20" rx="5" fill="#b07cff"/>
    <rect x="60" y="204" width="120" height="6" fill="#b07cff"/>
    <text x="70" y="204" font-size="11.5" fill="#0c0a13" font-weight="700">Image B</text>
    <circle cx="180" cy="220" r="5" fill="#5ad7ff" stroke="#0c0a13" stroke-width="2"/>
  </g>

  <!-- Comment node (sárga sticky) a frame mellett -->
  <g>
    <rect x="250" y="96" width="190" height="58" rx="3" fill="#2a2410" stroke="#ffb454" stroke-width="1.5"/>
    <rect x="250" y="96" width="190" height="16" fill="#ffb454"/>
    <text x="256" y="108" font-size="10.5" fill="#0c0a13" font-weight="700">💬 Comment</text>
    <text x="256" y="128" font-size="11" fill="#cfcae0">ide kerül a két karakter-</text>
    <text x="256" y="143" font-size="11" fill="#cfcae0">sprite, innen merge-eljük</text>
  </g>

  <!-- linkek kifelé a frame-ből -->
  <path d="M180 140 C 240 140, 250 250, 320 250" fill="none" stroke="#5ad7ff" stroke-width="2.5"/>
  <path d="M180 220 C 260 220, 260 268, 320 268" fill="none" stroke="#5ad7ff" stroke-width="2.5"/>

  <!-- Blend a frame-en kívül -->
  <g>
    <rect x="320" y="220" width="150" height="80" rx="5" fill="#1c1828" stroke="#ffb454" stroke-width="2"/>
    <rect x="320" y="220" width="150" height="20" rx="5" fill="#ffb454"/>
    <rect x="320" y="234" width="150" height="6" fill="#ffb454"/>
    <text x="330" y="234" font-size="11.5" fill="#0c0a13" font-weight="700">Blend</text>
    <circle cx="320" cy="250" r="5" fill="#5ad7ff" stroke="#0c0a13" stroke-width="2"/>
    <circle cx="320" cy="268" r="5" fill="#5ad7ff" stroke="#0c0a13" stroke-width="2"/>
    <circle cx="470" cy="260" r="5" fill="#5ad7ff" stroke="#0c0a13" stroke-width="2"/>
  </g>

  <!-- jobb oldalon: második Frame -->
  <rect x="560" y="220" width="260" height="100" rx="8" fill="rgba(126,217,87,.06)" stroke="#7ed957" stroke-width="2" stroke-dasharray="6 4"/>
  <rect x="560" y="220" width="170" height="26" rx="8" fill="#7ed957" opacity="0.18"/>
  <text x="574" y="238" font-size="12.5" fill="#cfe0b8" font-weight="700" letter-spacing="0.5">▦ Frame: „kimenet"</text>
  <g>
    <rect x="586" y="256" width="120" height="46" rx="5" fill="#1c1828" stroke="#7ed957" stroke-width="2"/>
    <rect x="586" y="256" width="120" height="18" rx="5" fill="#7ed957"/>
    <rect x="586" y="268" width="120" height="6" fill="#7ed957"/>
    <text x="596" y="269" font-size="11.5" fill="#0c0a13" font-weight="700">Preview</text>
    <circle cx="586" cy="286" r="5" fill="#5ad7ff" stroke="#0c0a13" stroke-width="2"/>
  </g>
  <path d="M470 260 C 520 260, 540 286, 586 286" fill="none" stroke="#5ad7ff" stroke-width="2.5"/>

  <!-- felső magyarázat -->
  <text x="30" y="36" font-size="12.5" fill="#d4a8ff">Frame-ek (halvány keret) csoportosítják a node-okat; Comment-ek (sárga) jegyzeteket tartalmaznak.</text>
  <text x="30" y="348" font-size="12" fill="#9a8fb0">A link akár <tspan fill="#5ad7ff">Frame-en kívülre</tspan> is futhat — a Frame csak vizuális, nem blokkolja az adatot.</text>
</svg>
