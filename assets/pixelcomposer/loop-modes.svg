<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" font-family="'IBM Plex Mono', monospace">
  <rect width="820" height="280" fill="#0c0a13"/>

  <!-- ===== LOOP MÓDOK - 4 mini panel ===== -->

  <!-- 1. Once -->
  <g>
    <rect x="20" y="20" width="190" height="240" fill="#14121c" stroke="#2a2440"/>
    <rect x="20" y="20" width="190" height="22" fill="#1c1828"/>
    <rect x="20" y="41" width="190" height="2" fill="#2a2440"/>
    <text x="32" y="36" font-size="12.5" fill="#7ed957" font-weight="700">Once</text>
    <text x="198" y="36" font-size="10" fill="#565066" text-anchor="end">egyszer</text>
    <rect x="36" y="60" width="158" height="140" fill="#0c0a13" stroke="#2a2440" stroke-width="0.5"/>
    <text x="30" y="66" font-size="9" fill="#565066" text-anchor="end">1</text>
    <text x="30" y="204" font-size="9" fill="#565066" text-anchor="end">0</text>
    <text x="36" y="218" font-size="9" fill="#565066">0</text>
    <text x="115" y="218" font-size="9" fill="#565066" text-anchor="middle">12</text>
    <text x="194" y="218" font-size="9" fill="#565066" text-anchor="end">24</text>
    <polygon points="36,194 41,188 46,194 41,200" fill="#b07cff"/>
    <polygon points="194,66 199,60 204,66 199,72" fill="#b07cff"/>
    <path d="M36 194 C 80 194, 150 66, 194 66" fill="none" stroke="#5ad7ff" stroke-width="2.5"/>
    <!-- utána: semmi (szürke) -->
    <line x1="194" y1="66" x2="194" y2="194" stroke="#3d3458" stroke-width="1" stroke-dasharray="2 2"/>
    <text x="115" y="240" font-size="11" fill="#9a8fb0" text-anchor="middle">stop a végén</text>
  </g>

  <!-- 2. Loop -->
  <g>
    <rect x="220" y="20" width="190" height="240" fill="#14121c" stroke="#2a2440"/>
    <rect x="220" y="20" width="190" height="22" fill="#1c1828"/>
    <rect x="220" y="41" width="190" height="2" fill="#2a2440"/>
    <text x="232" y="36" font-size="12.5" fill="#7ed957" font-weight="700">Loop</text>
    <text x="398" y="36" font-size="10" fill="#565066" text-anchor="end">ismétlés</text>
    <rect x="236" y="60" width="158" height="140" fill="#0c0a13" stroke="#2a2440" stroke-width="0.5"/>
    <text x="230" y="66" font-size="9" fill="#565066" text-anchor="end">1</text>
    <text x="230" y="204" font-size="9" fill="#565066" text-anchor="end">0</text>
    <text x="236" y="218" font-size="9" fill="#565066">0</text>
    <text x="315" y="218" font-size="9" fill="#565066" text-anchor="middle">12</text>
    <text x="394" y="218" font-size="9" fill="#565066" text-anchor="end">24</text>
    <polygon points="236,194 241,188 246,194 241,200" fill="#b07cff"/>
    <polygon points="394,66 399,60 404,66 399,72" fill="#b07cff"/>
    <path d="M236 194 C 280 194, 350 66, 394 66" fill="none" stroke="#5ad7ff" stroke-width="2.5"/>
    <!-- ismétlés jel: újra felfele (halvány) -->
    <path d="M394 194 C 440 194, 510 66, 554 66" fill="none" stroke="#5ad7ff" stroke-width="2.5" opacity="0.35"/>
    <text x="394" y="66" font-size="10" fill="#5ad7ff">↻</text>
    <text x="315" y="240" font-size="11" fill="#9a8fb0" text-anchor="middle">végén ugrás az elejére</text>
  </g>

  <!-- 3. Ping-Pong -->
  <g>
    <rect x="420" y="20" width="190" height="240" fill="#14121c" stroke="#2a2440"/>
    <rect x="420" y="20" width="190" height="22" fill="#1c1828"/>
    <rect x="420" y="41" width="190" height="2" fill="#2a2440"/>
    <text x="432" y="36" font-size="12.5" fill="#7ed957" font-weight="700">Ping-Pong</text>
    <text x="598" y="36" font-size="10" fill="#565066" text-anchor="end">oda-vissza</text>
    <rect x="436" y="60" width="158" height="140" fill="#0c0a13" stroke="#2a2440" stroke-width="0.5"/>
    <text x="430" y="66" font-size="9" fill="#565066" text-anchor="end">1</text>
    <text x="430" y="204" font-size="9" fill="#565066" text-anchor="end">0</text>
    <text x="436" y="218" font-size="9" fill="#565066">0</text>
    <text x="515" y="218" font-size="9" fill="#565066" text-anchor="middle">12</text>
    <text x="594" y="218" font-size="9" fill="#565066" text-anchor="end">24</text>
    <polygon points="436,194 441,188 446,194 441,200" fill="#b07cff"/>
    <polygon points="515,66 520,60 525,66 520,72" fill="#b07cff"/>
    <polygon points="594,194 599,188 604,194 599,200" fill="#b07cff"/>
    <!-- oda (fel) -->
    <path d="M436 194 C 480 194, 470 66, 515 66" fill="none" stroke="#5ad7ff" stroke-width="2.5"/>
    <!-- vissza (le) -->
    <path d="M515 66 C 560 66, 550 194, 594 194" fill="none" stroke="#ffb454" stroke-width="2.5"/>
    <text x="515" y="240" font-size="11" fill="#9a8fb0" text-anchor="middle">oda (cián) → vissza (narancs)</text>
  </g>

  <!-- 4. Wrap -->
  <g>
    <rect x="620" y="20" width="190" height="240" fill="#14121c" stroke="#2a2440"/>
    <rect x="620" y="20" width="190" height="22" fill="#1c1828"/>
    <rect x="620" y="41" width="190" height="2" fill="#2a2440"/>
    <text x="632" y="36" font-size="12.5" fill="#7ed957" font-weight="700">Wrap</text>
    <text x="798" y="36" font-size="10" fill="#565066" text-anchor="end">körbe</text>
    <rect x="636" y="60" width="158" height="140" fill="#0c0a13" stroke="#2a2440" stroke-width="0.5"/>
    <text x="630" y="66" font-size="9" fill="#565066" text-anchor="end">1</text>
    <text x="630" y="204" font-size="9" fill="#565066" text-anchor="end">0</text>
    <text x="636" y="218" font-size="9" fill="#565066">0</text>
    <text x="715" y="218" font-size="9" fill="#565066" text-anchor="middle">12</text>
    <text x="794" y="218" font-size="9" fill="#565066" text-anchor="end">24</text>
    <polygon points="636,194 641,188 646,194 641,200" fill="#b07cff"/>
    <polygon points="794,66 799,60 804,66 799,72" fill="#b07cff"/>
    <path d="M636 194 C 680 194, 750 66, 794 66" fill="none" stroke="#5ad7ff" stroke-width="2.5"/>
    <!-- wrap: érték folytatódik, de „eltolva" -->
    <path d="M794 194 C 840 194, 910 66, 954 66" fill="none" stroke="#ffb454" stroke-width="2.5" opacity="0.35"/>
    <text x="715" y="240" font-size="11" fill="#9a8fb0" text-anchor="middle">folytatódik, „túlcsordul"</text>
  </g>

  <!-- alsó megjegyzés -->
  <text x="20" y="270" font-size="11" fill="#565066">A Loop módot az Animation panelen választod ki — minden animált paraméternek saját beállítása van.</text>
</svg>
