<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'IBM Plex Mono', monospace">
  <!-- háttér -->
  <rect width="960" height="560" fill="#0c0a13"/>
  <!-- felső menüsáv -->
  <rect x="0" y="0" width="960" height="34" fill="#1c1828"/>
  <rect x="0" y="33" width="960" height="2" fill="#2a2440"/>
  <g font-size="13" fill="#9a8fb0">
    <text x="14" y="22">File</text>
    <text x="58" y="22">Edit</text>
    <text x="104" y="22">View</text>
    <text x="152" y="22">Node</text>
    <text x="204" y="22">Help</text>
  </g>
  <text x="902" y="22" font-size="12" fill="#b07cff" text-anchor="end">pixel-composer · pxc</text>

  <!-- bal panel: Node List / Collection -->
  <rect x="0" y="36" width="200" height="524" fill="#14121c"/>
  <rect x="199" y="36" width="2" height="524" fill="#2a2440"/>
  <text x="14" y="56" font-size="12" fill="#9a8fb0" letter-spacing="1">NODE LIST</text>
  <g font-size="13" fill="#cfcae0">
    <text x="14" y="84">▸ Input</text>
    <text x="14" y="106">▸ Transform</text>
    <text x="14" y="128">▸ Generate</text>
    <text x="28" y="150" fill="#d4a8ff">  MK Blast</text>
    <text x="28" y="172">  Particle</text>
    <text x="14" y="194">▸ VFX</text>
    <text x="14" y="216">▸ Render</text>
    <text x="14" y="238">▸ Export</text>
  </g>
  <rect x="0" y="36" width="200" height="524" fill="none" stroke="#2a2440" stroke-width="0"/>

  <!-- közepe: GRAPH panel (a fő vászon) -->
  <rect x="201" y="36" width="510" height="524" fill="#100d18"/>
  <!-- graph rács -->
  <g stroke="#1d1830" stroke-width="1">
    <line x1="201" y1="86" x2="711" y2="86"/>
    <line x1="201" y1="136" x2="711" y2="136"/>
    <line x1="201" y1="186" x2="711" y2="186"/>
    <line x1="201" y1="236" x2="711" y2="236"/>
    <line x1="201" y1="286" x2="711" y2="286"/>
    <line x1="201" y1="336" x2="711" y2="336"/>
    <line x1="201" y1="386" x2="711" y2="386"/>
    <line x1="201" y1="436" x2="711" y2="436"/>
    <line x1="201" y1="486" x2="711" y2="486"/>
    <line x1="251" y1="36" x2="251" y2="560"/>
    <line x1="301" y1="36" x2="301" y2="560"/>
    <line x1="351" y1="36" x2="351" y2="560"/>
    <line x1="401" y1="36" x2="401" y2="560"/>
    <line x1="451" y1="36" x2="451" y2="560"/>
    <line x1="501" y1="36" x2="501" y2="560"/>
    <line x1="551" y1="36" x2="551" y2="560"/>
    <line x1="601" y1="36" x2="601" y2="560"/>
    <line x1="651" y1="36" x2="651" y2="560"/>
  </g>
  <!-- GRAPH fejléc -->
  <rect x="201" y="36" width="510" height="24" fill="#1c1828"/>
  <rect x="201" y="59" width="510" height="2" fill="#2a2440"/>
  <text x="214" y="53" font-size="12" fill="#9a8fb0" letter-spacing="1">GRAPH</text>
  <text x="700" y="53" font-size="12" fill="#565066" text-anchor="end">100%</text>

  <!-- node: Image (Import) -->
  <g>
    <rect x="240" y="150" width="130" height="70" rx="4" fill="#1c1828" stroke="#b07cff" stroke-width="2"/>
    <rect x="240" y="150" width="130" height="22" rx="4" fill="#b07cff"/>
    <rect x="240" y="166" width="130" height="6" fill="#b07cff"/>
    <text x="248" y="166" font-size="12.5" fill="#0c0a13" font-weight="700">Image</text>
    <text x="248" y="196" font-size="11" fill="#9a8fb0">path: hero.png</text>
    <text x="248" y="212" font-size="11" fill="#5ad7ff">▸ Surface</text>
    <!-- output junction -->
    <circle cx="370" cy="208" r="6" fill="#5ad7ff" stroke="#0c0a13" stroke-width="2"/>
  </g>

  <!-- connection -->
  <path d="M370 208 C 410 208, 410 320, 450 320" fill="none" stroke="#5ad7ff" stroke-width="2.5"/>

  <!-- node: Preview -->
  <g>
    <rect x="450" y="280" width="140" height="80" rx="4" fill="#1c1828" stroke="#7ed957" stroke-width="2"/>
    <rect x="450" y="280" width="140" height="22" rx="4" fill="#7ed957"/>
    <rect x="450" y="296" width="140" height="6" fill="#7ed957"/>
    <text x="458" y="296" font-size="12.5" fill="#0c0a13" font-weight="700">Preview</text>
    <!-- input junction -->
    <circle cx="450" cy="320" r="6" fill="#5ad7ff" stroke="#0c0a13" stroke-width="2"/>
    <!-- preview content: mini pixel sprite -->
    <rect x="470" y="318" width="32" height="34" fill="#0c0a13"/>
    <g fill="#7ed957">
      <rect x="478" y="322" width="6" height="6"/>
      <rect x="484" y="328" width="6" height="6"/>
      <rect x="472" y="334" width="6" height="6"/>
      <rect x="490" y="340" width="6" height="6"/>
      <rect x="478" y="340" width="6" height="6"/>
    </g>
    <g fill="#ffb454">
      <rect x="486" y="322" width="6" height="6"/>
      <rect x="496" y="334" width="6" height="6"/>
    </g>
  </g>

  <!-- jobb-felső: PREVIEW panel -->
  <rect x="712" y="36" width="248" height="300" fill="#14121c"/>
  <rect x="712" y="36" width="248" height="24" fill="#1c1828"/>
  <rect x="712" y="59" width="248" height="2" fill="#2a2440"/>
  <text x="724" y="53" font-size="12" fill="#9a8fb0" letter-spacing="1">PREVIEW</text>
  <rect x="712" y="35" width="2" height="301" fill="#2a2440" transform="translate(248,0)"/>
  <!-- nagyobb pixel sprite preview -->
  <rect x="740" y="80" width="190" height="200" fill="#0c0a13" stroke="#1d1830"/>
  <g>
    <!-- egyszerű pixel hős -->
    <g fill="#7ed957">
      <rect x="810" y="100" width="14" height="14"/>
      <rect x="824" y="100" width="14" height="14"/>
      <rect x="838" y="100" width="14" height="14"/>
      <rect x="796" y="114" width="14" height="14"/>
      <rect x="852" y="114" width="14" height="14"/>
      <rect x="810" y="114" width="14" height="14"/>
      <rect x="824" y="114" width="14" height="14"/>
      <rect x="838" y="114" width="14" height="14"/>
      <rect x="796" y="128" width="14" height="14"/>
      <rect x="852" y="128" width="14" height="14"/>
      <rect x="810" y="128" width="14" height="14"/>
      <rect x="838" y="128" width="14" height="14"/>
      <rect x="796" y="142" width="14" height="14"/>
      <rect x="852" y="142" width="14" height="14"/>
      <rect x="810" y="142" width="14" height="14"/>
      <rect x="824" y="142" width="14" height="14"/>
      <rect x="838" y="142" width="14" height="14"/>
      <rect x="810" y="156" width="14" height="14"/>
      <rect x="824" y="156" width="14" height="14"/>
      <rect x="810" y="170" width="14" height="14"/>
      <rect x="824" y="170" width="14" height="14"/>
      <rect x="796" y="184" width="14" height="14"/>
      <rect x="852" y="184" width="14" height="14"/>
      <rect x="810" y="184" width="14" height="14"/>
      <rect x="824" y="184" width="14" height="14"/>
      <rect x="838" y="184" width="14" height="14"/>
    </g>
    <g fill="#ffb454">
      <rect x="824" y="100" width="14" height="14"/>
      <rect x="838" y="100" width="14" height="14"/>
      <rect x="824" y="114" width="14" height="14"/>
    </g>
    <g fill="#5ad7ff">
      <rect x="810" y="114" width="14" height="14"/>
      <rect x="838" y="114" width="14" height="14"/>
    </g>
    <g fill="#9a8fb0">
      <rect x="810" y="198" width="14" height="14"/>
      <rect x="824" y="198" width="14" height="14"/>
      <rect x="838" y="198" width="14" height="14"/>
      <rect x="796" y="212" width="14" height="14"/>
      <rect x="852" y="212" width="14" height="14"/>
    </g>
  </g>
  <text x="724" y="298" font-size="11" fill="#565066">128 × 128</text>

  <!-- jobb-alsó: INSPECTOR panel -->
  <rect x="712" y="338" width="248" height="222" fill="#14121c"/>
  <rect x="712" y="338" width="248" height="24" fill="#1c1828"/>
  <rect x="712" y="361" width="248" height="2" fill="#2a2440"/>
  <text x="724" y="355" font-size="12" fill="#9a8fb0" letter-spacing="1">INSPECTOR</text>
  <text x="724" y="380" font-size="12.5" fill="#d4a8ff" font-weight="700">Image</text>
  <g font-size="12" fill="#9a8fb0">
    <text x="724" y="404">Path</text>
    <rect x="800" y="394" width="148" height="16" fill="#0c0a13" stroke="#2a2440"/>
    <text x="806" y="406" fill="#5ad7ff">hero.png</text>
    <text x="724" y="428">Color</text>
    <rect x="800" y="418" width="148" height="16" fill="#0c0a13" stroke="#2a2440"/>
    <text x="724" y="452">Interpolate</text>
    <rect x="800" y="442" width="148" height="16" fill="#0c0a13" stroke="#2a2440"/>
    <text x="806" y="454" fill="#cfcae0">Bicubic</text>
    <text x="724" y="476">Canvas</text>
    <rect x="800" y="466" width="148" height="16" fill="#0c0a13" stroke="#2a2440"/>
    <text x="724" y="500">Scale</text>
    <rect x="800" y="490" width="148" height="16" fill="#0c0a13" stroke="#2a2440"/>
    <text x="806" y="502" fill="#cfcae0">1.00</text>
  </g>
  <!-- kis "Add animation" óra ikon utalás -->
  <text x="940" y="500" font-size="13" fill="#565066" text-anchor="end">◷</text>
