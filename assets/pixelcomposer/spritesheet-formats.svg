    <!-- frame indexek alul -->
    <text x="86" y="312" font-size="9.5" fill="#9a8fb0" text-anchor="middle">0</text>
    <text x="160" y="312" font-size="9.5" fill="#9a8fb0" text-anchor="middle">1</text>
    <text x="234" y="312" font-size="9.5" fill="#9a8fb0" text-anchor="middle">2</text>
    <text x="312" y="312" font-size="9.5" fill="#9a8fb0" text-anchor="middle">3</text>
    <text x="392" y="312" font-size="9.5" fill="#9a8fb0" text-anchor="middle">4</text>
    <text x="468" y="312" font-size="9.5" fill="#9a8fb0" text-anchor="middle">5</text>

    <!-- magyarázat jobbra -->
    <text x="520" y="248" font-size="11.5" fill="#9a8fb0">+ egyetlen fájl</text>
    <text x="520" y="266" font-size="11.5" fill="#9a8fb0">+ motor-barát formátum</text>
