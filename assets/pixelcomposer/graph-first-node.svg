<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="'IBM Plex Mono', monospace">
  <rect width="680" height="320" fill="#0c0a13"/>
  <!-- graph rács -->
  <g stroke="#1a1626" stroke-width="1">
    <line x1="0" y1="64" x2="680" y2="64"/>
    <line x1="0" y1="128" x2="680" y2="128"/>
    <line x1="0" y1="192" x2="680" y2="192"/>
    <line x1="0" y1="256" x2="680" y2="256"/>
    <line x1="113" y1="0" x2="113" y2="320"/>
    <line x1="226" y1="0" x2="226" y2="320"/>
    <line x1="339" y1="0" x2="339" y2="320"/>
    <line x1="452" y1="0" x2="452" y2="320"/>
    <line x1="565" y1="0" x2="565" y2="320"/>
  </g>

  <!-- üres graph környezet, egy node: Image -->
  <g>
    <rect x="200" y="110" width="160" height="90" rx="5" fill="#1c1828" stroke="#b07cff" stroke-width="2"/>
    <rect x="200" y="110" width="160" height="24" rx="5" fill="#b07cff"/>
    <rect x="200" y="128" width="160" height="6" fill="#b07cff"/>
    <text x="210" y="127" font-size="13.5" fill="#0c0a13" font-weight="700">Image</text>
    <text x="210" y="156" font-size="12" fill="#9a8fb0">path: (nincs)</text>
    <text x="210" y="174" font-size="12" fill="#9a8fb0">color: 0</text>
    <text x="210" y="192" font-size="12" fill="#5ad7ff" font-weight="600">▸ Surface</text>
    <!-- output junction (üresen lóg) -->
    <circle cx="360" cy="190" r="7" fill="#5ad7ff" stroke="#0c0a13" stroke-width="2"/>
  </g>

  <!-- jobb-klikk kontextusmenü utánozása (halvány) -->
  <g opacity="0.85">
    <rect x="400" y="90" width="180" height="148" rx="4" fill="#1c1828" stroke="#2a2440" stroke-width="1.5"/>
    <text x="412" y="108" font-size="12" fill="#9a8fb0" letter-spacing="1">ADD NODE</text>
    <line x1="412" y1="114" x2="568" y2="114" stroke="#2a2440"/>
    <text x="412" y="132" font-size="12.5" fill="#cfcae0">Input</text>
    <text x="412" y="150" font-size="12.5" fill="#cfcae0">Transform</text>
    <text x="412" y="168" font-size="12.5" fill="#cfcae0">Generate</text>
    <text x="412" y="186" font-size="12.5" fill="#d4a8ff" font-weight="600">▸ Image</text>
    <text x="412" y="204" font-size="12.5" fill="#cfcae0">VFX</text>
    <text x="412" y="222" font-size="12.5" fill="#cfcae0">Render / Export</text>
  </g>
  <!-- cursor -->
  <g>
    <path d="M392 96 L392 110 L396 106 L399 113 L402 112 L399 105 L405 105 Z" fill="#e8e3f0" stroke="#0c0a13" stroke-width="0.5"/>
  </g>

  <!-- lépés-címke -->
  <g font-size="12.5" fill="#9a8fb0">
    <text x="200" y="80">első node — Image (kép importálása)</text>
  </g>
  <g font-size="12.5" fill="#ffb454">
    <text x="200" y="248">jobb-klikk a Graph-on ▸ Add Node ▸ Image</text>
  </g>
</svg>
