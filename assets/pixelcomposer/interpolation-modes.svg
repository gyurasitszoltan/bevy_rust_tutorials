<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" font-family="'IBM Plex Mono', monospace">
  <rect width="820" height="320" fill="#0c0a13"/>

  <!-- közös háttér rács (mindhárom panelhez) -->
  <g stroke="#1a1626" stroke-width="1">
    <line x1="0" y1="40" x2="820" y2="40"/>
    <line x1="0" y1="260" x2="820" y2="260"/>
  </g>

  <!-- ===== 1. LINEAR ===== -->
  <g>
    <rect x="30" y="60" width="240" height="240" fill="#14121c" stroke="#2a2440"/>
    <rect x="30" y="60" width="240" height="22" fill="#1c1828"/>
    <rect x="30" y="81" width="240" height="2" fill="#2a2440"/>
    <text x="42" y="76" font-size="12.5" fill="#ffb454" font-weight="700">Linear</text>
    <text x="258" y="76" font-size="10" fill="#565066" text-anchor="end">egyenes</text>

    <!-- görbe terület (10..220 x, 90..230 y) -->
    <rect x="50" y="100" width="200" height="170" fill="#0c0a13" stroke="#2a2440" stroke-width="0.5"/>
    <!-- y-tengely értékek -->
    <text x="44" y="106" font-size="9" fill="#565066" text-anchor="end">1.0</text>
    <text x="44" y="272" font-size="9" fill="#565066" text-anchor="end">0.0</text>
    <!-- x frame jelek -->
    <text x="50" y="288" font-size="9" fill="#565066">0</text>
    <text x="150" y="288" font-size="9" fill="#565066" text-anchor="middle">12</text>
    <text x="250" y="288" font-size="9" fill="#565066" text-anchor="end">24</text>

    <!-- keyframe 1 (0,0) és 2 (24,1.0) -->
    <polygon points="50,270 57,262 64,270 57,278" fill="#b07cff"/>
    <polygon points="250,100 257,92 264,100 257,108" fill="#b07cff"/>
    <!-- lineáris egyenes -->
    <line x1="50" y1="270" x2="250" y2="100" stroke="#5ad7ff" stroke-width="2.5"/>
    <!-- keyframe 3 (24 vissza 0) - opcionális második ág -->
    <polygon points="250,270 257,262 264,270 257,278" fill="#b07cff" opacity="0.4"/>
  </g>

  <!-- ===== 2. SMOOTH ===== -->
  <g>
    <rect x="290" y="60" width="240" height="240" fill="#14121c" stroke="#2a2440"/>
    <rect x="290" y="60" width="240" height="22" fill="#1c1828"/>
    <rect x="290" y="81" width="240" height="2" fill="#2a2440"/>
    <text x="302" y="76" font-size="12.5" fill="#ffb454" font-weight="700">Smooth</text>
    <text x="518" y="76" font-size="10" fill="#565066" text-anchor="end">ívelt (ease)</text>

    <rect x="310" y="100" width="200" height="170" fill="#0c0a13" stroke="#2a2440" stroke-width="0.5"/>
    <text x="304" y="106" font-size="9" fill="#565066" text-anchor="end">1.0</text>
    <text x="304" y="272" font-size="9" fill="#565066" text-anchor="end">0.0</text>
    <text x="310" y="288" font-size="9" fill="#565066">0</text>
    <text x="410" y="288" font-size="9" fill="#565066" text-anchor="middle">12</text>
    <text x="510" y="288" font-size="9" fill="#565066" text-anchor="end">24</text>

    <polygon points="310,270 317,262 324,270 317,278" fill="#b07cff"/>
    <polygon points="510,100 517,92 524,100 517,108" fill="#b07cff"/>
    <!-- smooth (ease-in-out) Bézier -->
    <path d="M310 270 C 360 270, 460 100, 510 100" fill="none" stroke="#5ad7ff" stroke-width="2.5"/>
  </g>

  <!-- ===== 3. HOLD ===== -->
  <g>
    <rect x="550" y="60" width="240" height="240" fill="#14121c" stroke="#2a2440"/>
    <rect x="550" y="60" width="240" height="22" fill="#1c1828"/>
    <rect x="550" y="81" width="240" height="2" fill="#2a2440"/>
    <text x="562" y="76" font-size="12.5" fill="#ffb454" font-weight="700">Hold</text>
    <text x="778" y="76" font-size="10" fill="#565066" text-anchor="end">lépcsős</text>

    <rect x="570" y="100" width="200" height="170" fill="#0c0a13" stroke="#2a2440" stroke-width="0.5"/>
    <text x="564" y="106" font-size="9" fill="#565066" text-anchor="end">1.0</text>
    <text x="564" y="272" font-size="9" fill="#565066" text-anchor="end">0.0</text>
    <text x="570" y="288" font-size="9" fill="#565066">0</text>
    <text x="670" y="288" font-size="9" fill="#565066" text-anchor="middle">12</text>
    <text x="770" y="288" font-size="9" fill="#565066" text-anchor="end">24</text>

    <polygon points="570,270 577,262 584,270 577,278" fill="#b07cff"/>
    <polygon points="770,100 777,92 784,100 777,108" fill="#b07cff"/>
    <!-- hold: vízszintes, majd ugrás, majd vízszintes -->
    <line x1="570" y1="270" x2="670" y2="270" stroke="#5ad7ff" stroke-width="2.5"/>
    <line x1="670" y1="270" x2="670" y2="100" stroke="#5ad7ff" stroke-width="2.5" stroke-dasharray="3 3"/>
    <line x1="670" y1="100" x2="770" y2="100" stroke="#5ad7ff" stroke-width="2.5"/>
  </g>

  <!-- alsó magyarázat -->
  <text x="50" y="312" font-size="11" fill="#9a8fb0">állandó sebesség</text>
  <text x="310" y="312" font-size="11" fill="#9a8fb0">lassú kezdet &amp; vég, gyors közép</text>
  <text x="570" y="312" font-size="11" fill="#9a8fb0">érték „megmarad", majd ugrik</text>
</svg>
